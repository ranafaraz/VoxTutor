# Architecture

## Overview

VoxTutor is structured around three concerns: **utterance synthesis** (produce a signal with
a known answer), **scoring** (measure pronunciation quality), and **evaluation** (recover the
known answer and assert the dissociation). The scorers are textbook; what is designed is the
experiment.

## Utterance synthesis

Each utterance is a sequence of N phonemes drawn from a fixed inventory. Each phoneme has a
canonical template -- a mean feature vector in a small acoustic feature space. Frames are
generated by sampling around the template with a fixed within-phone variance.

**Mispronunciation injection.** A random subset of phoneme positions is marked as mispronounced.
At those positions the template is nudged by a confusable amount (large enough to be detectable
by a good scorer, small enough to cause failures when the ingredient is absent). The ground-truth
label vector is the binary mask of those positions.

**Distortion regimes.** Regimes add a second layer of variation on top of the clean signal:

| Regime | What changes | Ingredient that fixes it |
|---|---|---|
| clean | nothing (control) | -- |
| warped | speaking rate varied per phoneme (frame count stretched/compressed) | DTW forced alignment |
| noisy | additive heteroscedastic channel noise (per-utterance noise floor) | GOP normalization |

## Scorer implementations

All scorers are the four corners of a 2x2: **segmentation** x **normalization**.

### Segmentation axis

**Fixed segmentation (`fixed`).** The utterance frames are split into equal-length chunks, one
per phoneme. Correct only at constant speaking rate. Under rate variation, fast phonemes get too
few frames and slow phonemes too many -- the centroid drifts from the template.

**DTW forced alignment (`align`).** Dynamic Time Warping aligns the utterance frame sequence to
the canonical phoneme sequence by finding the minimum-cost monotone path through the cost matrix
(frame x phoneme). Each frame is assigned to the phoneme it aligns to. Handles arbitrary
per-phoneme rate variation with no tuning.

### Normalization axis

**Raw distance (`raw`).** The score at each phoneme position is the mean L2 distance from the
assigned frames to the canonical template. By the bias-variance decomposition, this equals the
true mispronunciation signal *plus* the within-phone variance. Channel noise inflates the
variance term uniformly, shrinking the signal-to-noise ratio.

**GOP normalization (`gop-norm`).** The score is the distance of the position centroid to the
template, *minus* the estimated within-phone variance (a Goodness-of-Pronunciation style
correction). Subtracting the variance removes the channel-level DC offset.

### The four scorers

| Scorer | Segmentation | Normalization | Handles rate | Handles noise |
|---|---|---|---|---|
| naive | fixed | raw | no | no |
| aligned | DTW | raw | yes | no |
| normalized | fixed | gop-norm | no | yes |
| gop | DTW | gop-norm | yes | yes |

## 2x2 dissociation design

- `naive` (neither): fails on both `warped` and `noisy`.
- `aligned` (segmentation only): passes `warped`, fails on `noisy`.
- `normalized` (normalization only): fails on `warped`, passes `noisy`.
- `gop` (both): passes all regimes.

## Module layout

```
voxtutor/
  synthesis/     -- utterance and phoneme generation
  scorers/       -- naive, aligned, normalized, gop implementations
  regimes/       -- clean, warped, noisy distortion generators
  eval/          -- AUROC, dissociation gate, harness
evals/
  harness.py     -- writes evals/RESULTS.md
  gate.py        -- asserts the 2x2 (CI gate)
tests/           -- 56 pytest tests
```
