# Evaluation

## Benchmark setup

- **Utterances:** 40 per cell (scorer x regime), 12 random seeds; results are mean AUROC across seeds.
- **Ground truth:** binary mispronunciation label per phoneme position, injected at synthesis time.
- **Metric:** AUROC. 1.0 = perfect recovery, 0.5 = chance.
- **Null:** scrambled ground truth -- every scorer must fall to ~0.50.

## Regimes

| Regime | Description |
|---|---|
| clean | Control -- no distortion |
| warped | Per-phoneme frame count stretched or compressed by a random factor |
| noisy | Additive heteroscedastic Gaussian noise; per-utterance noise floor |

## Results

Mean AUROC over 12 seeds, 40 utterances/cell.

| scorer | ingredients | clean | warped | noisy |
|---|---|--:|--:|--:|
| random | baseline | 0.491 | 0.509 | 0.508 |
| naive | fixed + raw | 1.000 | 0.620 | 0.730 |
| aligned | align + raw | 1.000 | 1.000 | 0.728 |
| normalized | fixed + gop-norm | 1.000 | 0.662 | 0.999 |
| **gop** | **align + gop-norm** | **1.000** | **1.000** | **0.999** |

## Key findings

**Effect 1:** Fixed-segmentation scorers drop on `warped` (naive 1.000→0.620). DTW scorers stay at 1.000.

**Effect 2:** Raw scorers drop on `noisy` (naive 1.000→0.730, aligned 1.000→0.728). GOP scorers stay at ~1.0.

Only `gop` (both ingredients) is robust everywhere.

## Reproduce

```bash
python -m evals.harness   # full table
python -m evals.gate      # CI gate
voxtutor compare --regime warped
voxtutor compare --regime noisy
```
