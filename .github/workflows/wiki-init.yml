# Configuration

All configuration via environment variables. Defaults reproduce the published benchmark.

## Environment variables

| Variable | Default | Description |
|---|---|---|
| `VOXTUTOR_METHOD` | `gop` | Scorer: `naive`, `aligned`, `normalized`, `gop`, `random` |
| `VOXTUTOR_REGIME` | `clean` | Regime: `clean`, `warped`, `noisy` |
| `VOXTUTOR_LABELS` | *(built-in)* | Path to custom phoneme label file (optional) |
| `VOXTUTOR_SAMPLES` | `40` | Number of utterances per cell |
| `VOXTUTOR_SEED` | `42` | Base random seed |
| `VOXTUTOR_BACKEND` | `numpy` | Compute backend (numpy = offline) |

## .env.example

```dotenv
VOXTUTOR_METHOD=gop
VOXTUTOR_REGIME=clean
VOXTUTOR_SAMPLES=40
VOXTUTOR_SEED=42
VOXTUTOR_BACKEND=numpy
```

## Usage

```bash
voxtutor score --method aligned --regime warped
voxtutor compare --regime noisy
voxtutor regimes
```
