# Development

## Setup

```bash
git clone https://github.com/ranafaraz/VoxTutor.git
cd VoxTutor
python -m venv .venv && source .venv/bin/activate
pip install -e ".[dev]"
pytest -q   # 56 tests
```

Optional scipy cross-check: `pip install -e ".[scipy]"`

## Structure

```
voxtutor/
  synthesis/    -- phoneme inventory, utterance generator, mispronunciation injector
  scorers/      -- naive, aligned, normalized, gop, random_scorer
  regimes/      -- clean, warped, noisy distortion generators
  eval/         -- auroc, gate
  cli.py        -- CLI entry point
evals/          -- harness.py, gate.py
tests/          -- 56 pytest tests
docs/           -- ARCHITECTURE.md, DECISIONS.md, demo.gif
```

## Adding a scorer

1. Create `voxtutor/scorers/my_scorer.py` with `score(utterance, phonemes) -> np.ndarray`.
2. Register in `voxtutor/scorers/__init__.py`.
3. Add tests in `tests/test_scorers.py`.
4. Add key to `VOXTUTOR_METHOD` accepted values.

## Adding a regime

1. Create `voxtutor/regimes/my_regime.py` with `apply(utterance, rng) -> utterance`.
2. Register in `voxtutor/regimes/__init__.py` and add description.
3. Add tests: regime must not change ground-truth labels.

## CI

Runs `pytest -q` + `python -m evals.gate` on Python 3.10, 3.11, 3.12. No secrets needed.

## Code style

`black` + `ruff`. All random state via `np.random.default_rng(seed)`.
